<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi Pesan Makanan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="max-w-md mx-auto p-4 bg-gray-50">

<!-- HALAMAN UTAMA PILIH MENU -->
<div id="halamanUtama">
  <h1 class="text-xl font-bold text-center text-orange-600 mb-6">🍜 Aplikasi Pesan Makanan</h1>
  <div class="space-y-3">
    <button onclick="bukaHalaman('admin')" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold">🔐 Panel Admin</button>
    <button onclick="bukaHalaman('pelanggan')" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">🛒 Pesan Pelanggan</button>
    <button onclick="bukaHalaman('driver')" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">🛵 Panel Driver</button>
  </div>
  <p class="text-center text-gray-500 text-sm mt-6">Pilih sesuai kebutuhan Anda</p>
</div>

<!-- HALAMAN ADMIN -->
<div id="halamanAdmin" class="hidden">
  <button onclick="kembali()" class="mb-3 text-blue-600">← Kembali ke Menu Utama</button>
  <h1 class="text-xl font-bold text-center text-red-700 mb-4">🔐 PANEL ADMIN</h1>

  <form id="formMenu" class="bg-white p-4 rounded-xl shadow mb-4">
    <h3 class="font-bold mb-3">➕ Tambah Warung & Menu</h3>
    <input type="text" id="namaWarung" placeholder="Nama Warung" class="w-full border p-3 rounded mb-2" required>
    <input type="text" id="namaMenu" placeholder="Nama Makanan/Minuman" class="w-full border p-3 rounded mb-2" required>
    <input type="number" id="hargaMenu" placeholder="Harga (Rp)" class="w-full border p-3 rounded mb-2" required min="100">
    <textarea id="keterangan" placeholder="Keterangan (opsional)" class="w-full border p-3 rounded mb-3" rows="2"></textarea>
    <button type="submit" class="w-full bg-green-600 text-white py-3 rounded font-bold">✅ SIMPAN MENU</button>
  </form>

  <div class="bg-white p-4 rounded-xl shadow">
    <h3 class="font-bold mb-3">📋 Daftar Menu Tersimpan</h3>
    <div id="daftarMenuAdmin"><p class="text-center text-gray-500">Memuat...</p></div>
  </div>
</div>

<!-- HALAMAN PELANGGAN -->
<div id="halamanPelanggan" class="hidden">
  <button onclick="kembali()" class="mb-3 text-blue-600">← Kembali ke Menu Utama</button>
  <h1 class="text-xl font-bold text-center text-orange-600 mb-4">🛒 Pesan Makanan</h1>
  <div class="bg-white p-4 rounded-xl shadow">
    <h3 class="font-bold mb-3">📋 Menu Tersedia</h3>
    <div id="daftarMenuPelanggan"><p class="text-center text-gray-500">Memuat menu...</p></div>
  </div>
</div>

<!-- HALAMAN DRIVER -->
<div id="halamanDriver" class="hidden">
  <button onclick="kembali()" class="mb-3 text-blue-600">← Kembali ke Menu Utama</button>
  <h1 class="text-xl font-bold text-center text-green-700 mb-4">🛵 Panel Driver</h1>
  <div class="bg-white p-4 rounded-xl shadow p-6 text-center">
    <p class="text-gray-600">Siap menerima pesanan baru!</p>
  </div>
</div>

<script>
// KONEKSI KE DATABASE FIREBASE KAKAK
const firebaseConfig = {
  apiKey: "AIzaSyCqC6XKfXzI3QaM7yW8vR9pQ7Z8xY7w9e8rT7s6a5d4f3g2h1j0k9l8m7n6b5v4c3x2z1",
  authDomain: "kurir-ongkir.firebaseapp.com",
  databaseURL: "https://kurir-ongkir-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kurir-ongkir",
  storageBucket: "kurir-ongkir.appspot.com",
  messagingSenderId: "123456789012",
  appId: "1:123456789012:web:abc123def456ghi789jkl01"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// FUNGSI GANTI HALAMAN
function bukaHalaman(namaHalaman) {
  document.querySelectorAll('body > div').forEach(halaman => halaman.classList.add('hidden'));
  document.getElementById('halaman' + namaHalaman.charAt(0).toUpperCase() + namaHalaman.slice(1)).classList.remove('hidden');
  if (namaHalaman === 'admin') tampilMenuAdmin();
  if (namaHalaman === 'pelanggan') tampilMenuPelanggan();
}
function kembali() {
  bukaHalaman('Utama');
}

// SIMPAN MENU KE DATABASE
document.getElementById('formMenu').addEventListener('submit', async (e) => {
  e.preventDefault();
  const warung = document.getElementById('namaWarung').value.trim();
  const menu = document.getElementById('namaMenu').value.trim();
  const harga = parseInt(document.getElementById('hargaMenu').value);
  const ket = document.getElementById('keterangan').value.trim();

  if (!warung || !menu || !harga) return alert("Lengkapi semua data menu!");

  try {
    const id = "MNU-" + Date.now();
    await db.ref('daftarMenu/' + id).set({
      id, warung, nama: menu, harga, keterangan: ket || "-", waktu: firebase.database.ServerValue.TIMESTAMP
    });
    alert("✅ BERHASIL! Menu sudah tersimpan.");
    e.target.reset();
    tampilMenuAdmin();
  } catch (err) {
    alert("❌ Gagal simpan: " + err.message);
  }
});

// TAMPILKAN MENU DI HALAMAN ADMIN
function tampilMenuAdmin() {
  db.ref('daftarMenu').orderByChild('waktu').on('value', snap => {
    const data = snap.val(), el = document.getElementById('daftarMenuAdmin');
    el.innerHTML = '';
    if (!data) { el.innerHTML = '<p class="text-center text-gray-500">Belum ada menu</p>'; return; }
    Object.values(data).forEach(item => {
      el.innerHTML += `<div class="border-b py-2"><p class="font-semibold">${item.nama}</p><p class="text-sm text-gray-600">📍 ${item.warung}</p><p class="font-bold text-orange-600">Rp ${item.harga.toLocaleString()}</p></div>`;
    });
  });
}

// TAMPILKAN MENU DI HALAMAN PELANGGAN
function tampilMenuPelanggan() {
  db.ref('daftarMenu').on('value', snap => {
    const data = snap.val(), el = document.getElementById('daftarMenuPelanggan');
    el.innerHTML = '';
    if (!data) { el.innerHTML = '<p class="text-center text-gray-500">Belum ada menu tersedia</p>'; return; }
    Object.values(data).forEach(item => {
      el.innerHTML += `<div class="border-b py-2"><p class="font-semibold">${item.nama}</p><p class="text-sm text-gray-600">${item.warung}</p><p class="font-bold text-orange-600">Rp ${item.harga.toLocaleString()}</p></div>`;
    });
  });
}
</script>
</body>
</html>
